<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>ENAM - Fiche de renseignements</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1>ECOLE NATIONALE DES ARTS ET METIERS</h1>
    <h2>ENAM</h2>
    <p>APPROCHE PAR COMPETENCE (APC) DIPLOME TECHNIQUE</p>
    <div id="promoInfo"></div>
  </div>

  <form id="studentForm">
    <div class="form-section">
      <h4>Informations personnelles</h4>
      <label>Nom <span class="required">*</span></label>
      <div class="autocomplete-wrapper">
        <input type="text" id="nom" required autocomplete="off">
        <div id="autocomplete-list" class="autocomplete-items"></div>
      </div>

      <label>Prénom <span class="required">*</span></label>
      <input type="text" id="prenom" required>

      <label>Téléphone WhatsApp</label>
      <input type="tel" id="telephone_whatsapp" placeholder="+509 XX XX XXXX">

      <label>Téléphone Appel</label>
      <input type="tel" id="telephone_appel" placeholder="+509 XX XX XXXX">

      <label>Adresse</label>
      <textarea id="adresse" rows="2"></textarea>
    </div>

    <div class="form-section">
      <h4>Personne à contacter</h4>
      <label>Nom</label>
      <input type="text" id="contact_nom">

      <label>Lien de parenté</label>
      <input type="text" id="contact_lien" placeholder="Mère, Père, Tuteur...">

      <label>Téléphone</label>
      <input type="tel" id="contact_telephone" placeholder="+509 XX XX XXXX">
    </div>

    <button type="submit" id="submitBtn">Envoyer</button>
    <p id="message" class="message"></p>
  </form>
</div>
<script src="script.js"></script>
</body>
</html>
