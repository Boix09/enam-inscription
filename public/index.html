<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<title>ENAM - Fiche de renseignements</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="siteBanner"></div>
<button id="darkModeToggle" title="Mode sombre"></button>
<div class="container">
  <div class="header">
    <img src="/logo.jpg" alt="ENAM" class="logo">
    <h1>ÉCOLE NATIONALE DES ARTS ET MÉTIERS</h1>
    <h2>ENAM</h2>
    <p>APPROCHE PAR COMPÉTENCE (APC) DIPLÔME TECHNIQUE</p>
    <div id="promoInfo"></div>
  </div>

  <form id="studentForm">
    <div class="form-section">
      <h4>Informations personnelles</h4>
      <label>Nom <span class="required">*</span></label>
      <div class="autocomplete-wrapper">
        <input type="text" id="nom" required autocomplete="off">
        <div id="autocomplete-list" class="autocomplete-items"></div>
      </div>

      <label>Prénom <span class="required">*</span></label>
      <input type="text" id="prenom" required>

      <label>Téléphone WhatsApp <span class="required">*</span></label>
      <input type="tel" id="telephone_whatsapp" required placeholder="+509 XX XX XXXX" pattern="\+509 \d{2} \d{2} \d{4}" maxlength="16">

      <label>Téléphone Appel <span class="required">*</span></label>
      <input type="tel" id="telephone_appel" required placeholder="+509 XX XX XXXX" pattern="\+509 \d{2} \d{2} \d{4}" maxlength="16">

      <label>Adresse <span class="required">*</span></label>
      <textarea id="adresse" required rows="2"></textarea>
    </div>

    <div class="form-section">
      <h4>Personne à contacter</h4>
      <label>Nom <span class="required">*</span></label>
      <input type="text" id="contact_nom" required>

      <label>Lien de parenté <span class="required">*</span></label>
      <input type="text" id="contact_lien" required placeholder="Mère, Père, Tuteur...">

      <label>Téléphone <span class="required">*</span></label>
      <input type="tel" id="contact_telephone" required placeholder="+509 XX XX XXXX" pattern="\+509 \d{2} \d{2} \d{4}" maxlength="16">
    </div>

    <button type="submit" id="submitBtn">Envoyer</button>
    <p id="message" class="message"></p>
  </form>
</div>
<script src="/features.js"></script>
<script src="/script.js"></script>
</body>
</html>
